<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>펫 키우기 🐾</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
  html,body { width:100%; height:100%; overflow:hidden; }
  body { background:#2a1a0e; }
  #app { position:fixed; inset:0; max-width:480px; margin:0 auto; background:#000; }
  .screen { position:absolute; inset:0; display:none; }
  .screen.on { display:block; }

  /* ===== 공통 ===== */
  .toast { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(.8); background:rgba(0,0,0,.82); color:#fff; padding:14px 26px; border-radius:18px; font-size:17px; font-weight:700; z-index:200; opacity:0; transition:.25s; pointer-events:none; text-align:center; }
  .toast.show { opacity:1; transform:translate(-50%,-50%) scale(1); }
  .btn { border:none; border-radius:20px; font-weight:800; cursor:pointer; }

  /* ===== 펫 선택 ===== */
  #selectScreen { background:linear-gradient(180deg,#a0e9ff,#74c4ef); overflow-y:auto; }
  #selectScreen h1 { text-align:center; color:#fff; font-size:24px; padding:22px 0 6px; text-shadow:0 2px 6px rgba(0,0,0,.25); }
  #selectScreen .sub { text-align:center; color:#fff; opacity:.9; font-size:13px; margin-bottom:14px; }
  .petGrid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; padding:0 16px 24px; }
  .petCard { background:rgba(255,255,255,.9); border-radius:18px; padding:14px 6px; text-align:center; box-shadow:0 4px 10px rgba(0,0,0,.12); transition:transform .1s; }
  .petCard:active { transform:scale(.94); }
  .petCard .e { font-size:40px; }
  .petCard .n { font-size:13px; color:#2b6285; font-weight:800; margin-top:4px; }
  .petCard .tag { font-size:10px; color:#7a93a3; margin-top:2px; }

  /* ===== 메인 돌보기 ===== */
  #mainScreen { background:linear-gradient(180deg,#ffe8c2 0%,#ffd29e 58%,#e0a064 58%,#cf8a4a 100%); }
  #mainScreen.on { display:flex; flex-direction:column; }
  .topbar { padding:12px 14px; display:flex; justify-content:space-between; align-items:center; z-index:6; flex:0 0 auto; }
  .pill { background:rgba(255,255,255,.9); color:#7a4a1d; font-weight:800; padding:7px 14px; border-radius:18px; font-size:14px; box-shadow:0 2px 6px rgba(0,0,0,.1); }
  .coinPill { background:rgba(0,0,0,.32); color:#ffd84d; }
  .stageTag { background:rgba(255,255,255,.85); color:#a05a1d; font-weight:800; font-size:12px; padding:5px 14px; border-radius:14px; }

  .stage3d { position:relative; flex:1 1 auto; min-height:120px; }
  #houseEmoji { position:absolute; bottom:14px; left:50%; transform:translateX(-50%); font-size:74px; opacity:.95; }
  #petEmoji { position:absolute; bottom:34px; left:50%; transform:translateX(-50%); font-size:70px; transition:font-size .4s; animation:petHop 1.6s ease-in-out infinite; cursor:pointer; }
  @keyframes petHop { 0%,100%{transform:translateX(-50%) translateY(0) rotate(0);} 50%{transform:translateX(-50%) translateY(-14px) rotate(-3deg);} }
  #petEmoji.sad { animation:petSad 2s ease-in-out infinite; filter:grayscale(.4) brightness(.9); }
  @keyframes petSad { 0%,100%{transform:translateX(-50%) translateY(0);} 50%{transform:translateX(-50%) translateY(-3px);} }
  .fx { position:absolute; font-size:30px; pointer-events:none; animation:fxUp 1.1s ease-out forwards; z-index:8; }
  @keyframes fxUp { 0%{opacity:0; transform:translateY(0) scale(.5);} 25%{opacity:1;} 100%{opacity:0; transform:translateY(-70px) scale(1.3);} }

  /* 하단 패널 */
  .bottomPanel { flex:0 0 auto; padding:0 10px 12px; background:rgba(255,255,255,.18); }
  /* 만족도 게이지 */
  .satBox { padding:8px 6px 10px; }
  .satTop { display:flex; justify-content:space-between; color:#7a4a1d; font-size:12px; font-weight:800; margin-bottom:4px; }
  .satBar { height:18px; background:rgba(0,0,0,.16); border:2px solid #fff; border-radius:14px; overflow:hidden; }
  #satFill { height:100%; width:50%; background:linear-gradient(90deg,#ff8fb0,#ff4d7e); border-radius:12px; transition:width .4s; }

  /* 케어 버튼 */
  .careGrid { display:grid; grid-template-columns:repeat(4,1fr); gap:7px; margin-bottom:7px; }
  .menuBar { display:grid; grid-template-columns:repeat(3,1fr); gap:7px; }
  .careBtn { background:rgba(255,255,255,.94); border-radius:14px; padding:8px 0 6px; text-align:center; box-shadow:0 3px 0 rgba(0,0,0,.12); transition:transform .08s; }
  .careBtn:active { transform:translateY(2px); box-shadow:0 1px 0 rgba(0,0,0,.12); }
  .careBtn .ic { font-size:23px; } .careBtn .t { font-size:11px; color:#7a4a1d; font-weight:800; margin-top:1px; }
  .careBtn.shop { background:#ffe08a; } .careBtn.game { background:#bdf0c0; }

  /* ===== 상점 ===== */
  #shopScreen { background:linear-gradient(180deg,#ffe6a8,#ffcf7a); }
  .shopHead { display:flex; align-items:center; justify-content:space-between; padding:16px; }
  .shopHead h2 { color:#7a4a1d; font-size:22px; }
  .backBtn { background:#fff; color:#7a4a1d; padding:8px 16px; border-radius:16px; font-weight:800; }
  .shopList { padding:0 16px; }
  .shopItem { background:#fff; border-radius:18px; padding:14px 16px; margin-bottom:12px; display:flex; align-items:center; gap:14px; box-shadow:0 3px 8px rgba(0,0,0,.1); }
  .shopItem .e { font-size:42px; }
  .shopItem .info { flex:1; }
  .shopItem .info .nm { font-weight:800; color:#5a3815; font-size:16px; }
  .shopItem .info .ds { font-size:12px; color:#9a7a55; margin-top:2px; }
  .buyBtn { background:linear-gradient(180deg,#ffcb3d,#ffa600); color:#3a2600; padding:10px 16px; border-radius:16px; font-weight:800; font-size:14px; box-shadow:0 3px 0 #c97f00; }
  .buyBtn:active { transform:translateY(2px); box-shadow:0 1px 0 #c97f00; }
  .buyBtn.owned { background:#cfcfcf; color:#777; box-shadow:0 3px 0 #aaa; }

  /* ===== 미니게임 공통 ===== */
  .miniHead { position:absolute; top:0; left:0; right:0; padding:12px 14px; display:flex; justify-content:space-between; align-items:center; z-index:10; }

  /* 간식받기 */
  #catchScreen { background:linear-gradient(180deg,#bfe9ff,#88c9f0); }
  #catchArea { position:absolute; inset:0; overflow:hidden; }
  .falling { position:absolute; font-size:34px; will-change:top; }
  #basket { position:absolute; bottom:26px; font-size:56px; transform:translateX(-50%); will-change:left; }

  /* 짝맞추기 */
  #matchScreen { background:linear-gradient(180deg,#d6c2ff,#b69cf0); }
  #matchGrid { position:absolute; left:14px; right:14px; top:120px; bottom:24px; display:grid; gap:8px; align-content:start; }
  .mcard { background:#fff; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:30px; cursor:pointer; transition:transform .15s; box-shadow:0 2px 5px rgba(0,0,0,.15); aspect-ratio:1; }
  .mcard.flipped { background:#ffe9a8; }
  .mcard.matched { background:#bdf0c0; opacity:.6; }
  .mcard:not(.flipped):not(.matched){ color:transparent; }
  .mcard .back { color:#c0a0f0; }

  /* ===== 진화 연출 ===== */
  #evolveScreen { background:radial-gradient(circle at 50% 42%,#fff6c2,#ffd56b 38%,#ff9f43 100%); z-index:50; }
  .ray { position:absolute; top:42%; left:50%; width:140%; padding-bottom:140%; transform:translate(-50%,-50%); background:repeating-conic-gradient(from 0deg,rgba(255,255,255,.55) 0deg 12deg,transparent 12deg 24deg); border-radius:50%; animation:spin 9s linear infinite; }
  @keyframes spin { to{transform:translate(-50%,-50%) rotate(360deg);} }
  #evolvePet { position:absolute; top:38%; left:50%; transform:translate(-50%,-50%); font-size:110px; z-index:2; animation:evoPop .6s cubic-bezier(.2,1.5,.5,1); filter:drop-shadow(0 8px 16px rgba(0,0,0,.3)); }
  @keyframes evoPop { 0%{transform:translate(-50%,-50%) scale(0);} 100%{transform:translate(-50%,-50%) scale(1);} }
  #evolveTxt { position:absolute; top:62%; left:0; right:0; text-align:center; color:#fff; font-weight:900; font-size:30px; text-shadow:0 3px 8px rgba(0,0,0,.35); z-index:2; }
  #evolveSub { position:absolute; top:71%; left:0; right:0; text-align:center; color:#fff; font-weight:700; font-size:16px; text-shadow:0 2px 6px rgba(0,0,0,.35); z-index:2; line-height:1.5; }
  #evolveScreen .tapclose { position:absolute; bottom:40px; left:0; right:0; text-align:center; color:#fff; font-size:14px; opacity:.85; z-index:2; }

  /* ===== 죽음 ===== */
  #deadScreen { background:linear-gradient(180deg,#555,#222); z-index:60; }
  #deadScreen .box { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; color:#fff; width:80%; }
  #deadScreen .e { font-size:90px; filter:grayscale(1); }
  #deadScreen h2 { font-size:26px; margin-top:14px; }
  #deadScreen p { margin-top:10px; opacity:.85; font-size:15px; line-height:1.5; }
  #deadScreen button { margin-top:24px; background:#ff6b6b; color:#fff; padding:14px 32px; border-radius:24px; font-weight:800; font-size:17px; }
</style>
</head>
<body>
<div id="app">

  <!-- 펫 선택 -->
  <div class="screen on" id="selectScreen">
    <h1>🐾 펫 키우기</h1>
    <div class="sub">어떤 펫을 키울까? 골라봐!</div>
    <div class="petGrid" id="petGrid"></div>
  </div>

  <!-- 메인 돌보기 -->
  <div class="screen" id="mainScreen">
    <div class="topbar">
      <span class="pill" id="petName">🐶 멍멍이</span>
      <span class="stageTag" id="stageTag">아기</span>
      <span class="pill coinPill" id="coin">💰 0</span>
    </div>
    <div class="stage3d" id="stage3d">
      <div id="houseEmoji"></div>
      <div id="petEmoji">🐶</div>
    </div>
    <div class="bottomPanel">
      <div class="satBox">
        <div class="satTop"><span>😊 만족도</span><span id="satPct">50%</span></div>
        <div class="satBar"><div id="satFill"></div></div>
      </div>
      <div class="careGrid" id="careGrid"></div>
      <div class="menuBar">
        <div class="careBtn shop" onclick="enterShop()"><div class="ic">🛒</div><div class="t">상점</div></div>
        <div class="careBtn game" onclick="startCatch()"><div class="ic">🦴</div><div class="t">간식받기</div></div>
        <div class="careBtn game" onclick="startMatch()"><div class="ic">🃏</div><div class="t">짝맞추기</div></div>
      </div>
    </div>
  </div>

  <!-- 상점 -->
  <div class="screen" id="shopScreen">
    <div class="shopHead">
      <h2>🛒 상점</h2>
      <span class="pill coinPill" id="shopCoin">💰 0</span>
      <span class="backBtn" onclick="go('main')">← 뒤로</span>
    </div>
    <div class="shopList" id="shopList"></div>
  </div>

  <!-- 간식받기 -->
  <div class="screen" id="catchScreen">
    <div class="miniHead">
      <span class="pill" id="catchScore">🦴 0</span>
      <span class="pill" id="catchTime">⏱ 30</span>
      <span class="backBtn" onclick="endCatch()">그만</span>
    </div>
    <div id="catchArea"></div>
    <div id="basket">🐶</div>
  </div>

  <!-- 짝맞추기 -->
  <div class="screen" id="matchScreen">
    <div class="miniHead">
      <span class="pill" id="matchLevel">레벨 1</span>
      <span class="pill" id="matchTime">⏱ 30</span>
      <span class="backBtn" onclick="endMatch(false)">그만</span>
    </div>
    <div id="matchGrid"></div>
  </div>

  <!-- 진화 -->
  <div class="screen" id="evolveScreen">
    <div class="ray"></div>
    <div id="evolvePet">🐕</div>
    <div id="evolveTxt">✨ 진화! ✨</div>
    <div id="evolveSub"></div>
    <div class="tapclose">화면을 탭하면 계속</div>
  </div>

  <!-- 죽음 -->
  <div class="screen" id="deadScreen">
    <div class="box">
      <div class="e" id="deadEmoji">🐶</div>
      <h2>펫이 무지개 다리를 건넜어요...</h2>
      <p id="deadMsg"></p>
      <button onclick="resetGame()">새로운 펫 키우기</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
/* ============ 펫 데이터 ============ */
// cares: 그 펫이 "좋아하는" 케어 목록. 그 외 케어를 하면 싫어함(만족도 down)
const PETS = {
  dog:    { name:'강아지', emojis:['🐶','🐶','🐕'],   cares:['food','play','wash','sleep','heal','walk'], houseEmoji:'🛏️', houseName:'강아지 방석' },
  cat:    { name:'고양이', emojis:['🐱','🐱','🐈'],   cares:['food','play','wash','sleep','heal','walk'], houseEmoji:'🛏️', houseName:'고양이 쿠션' },
  turtle: { name:'거북이', emojis:['🐢','🐢','🐢'],   cares:['food','play','wash','sleep','heal'],        houseEmoji:'💧', houseName:'거북이 수조' },
  hamster:{ name:'햄스터', emojis:['🐹','🐹','🐹'],   cares:['food','play','wash','sleep','heal'],        houseEmoji:'🎡', houseName:'햄스터 케이지' },
  guppy:  { name:'구피',   emojis:['🐠','🐠','🐠'],   cares:['food'],                                      houseEmoji:'🪣', houseName:'어항' },
  nemo:   { name:'니모',   emojis:['🐠','🐠','🐠'],   cares:['food'],                                      houseEmoji:'🪣', houseName:'어항' },
  stag:   { name:'사슴벌레', emojis:['🐛','🥚','🪲'], cares:['food'], bug:true,                            houseEmoji:'📦', houseName:'사육장' },
  beetle: { name:'장수풍뎅이', emojis:['🐛','🥚','🦗'], cares:['food'], bug:true,                          houseEmoji:'📦', houseName:'사육장' },
  lizard: { name:'도마뱀', emojis:['🦎','🦎','🦎'],   cares:['food'],                                      houseEmoji:'📦', houseName:'테라리움' },
  bird:   { name:'새',     emojis:['🐤','🐤','🐦'],   cares:['food','outside'],                            houseEmoji:'🏠', houseName:'새장' },
};
const CARE_INFO = {
  food:    { ic:'🍖', t:'밥',   fx:'🍖', vital:true },
  play:    { ic:'🎾', t:'놀기', fx:'🎾', vital:true },
  wash:    { ic:'🛁', t:'씻기', fx:'🫧', vital:true },
  sleep:   { ic:'😴', t:'잠',   fx:'💤' },
  heal:    { ic:'💊', t:'치료', fx:'💊' },
  walk:    { ic:'🦮', t:'산책', fx:'🐾' },
  outside: { ic:'🌳', t:'구경', fx:'✨' },
};
const STAGE_NAMES_NORMAL = ['아기','청소년','어른'];
const STAGE_NAMES_BUG = ['애벌레','번데기','성충'];
const STAGE_SIZE = [64, 92, 120];
const THREE_DAYS = 3*24*60*60*1000;

/* ============ 상태 ============ */
let S = null;
function defaultState(type){
  return { type, stage:0, sat:50, money:50, food:2, hasHouse:false, lastVital:Date.now(), lastTick:Date.now(), alive:true };
}
function save(){ if(S) localStorage.setItem('pet_save', JSON.stringify(S)); }
function load(){ try{ return JSON.parse(localStorage.getItem('pet_save')); }catch(e){ return null; } }

/* ============ 화면 전환 ============ */
const screens = ['select','main','shop','catch','match','evolve','dead'];
function go(name){
  screens.forEach(s=>document.getElementById(s+'Screen').classList.toggle('on', s===name));
}
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1400);
}

/* ============ 펫 선택 ============ */
function buildSelect(){
  const g=document.getElementById('petGrid');
  g.innerHTML=Object.entries(PETS).map(([k,p])=>{
    const tag = p.cares.length<=1 ? '밥만 OK' : (p.cares.includes('outside')?'밥+구경':'할 게 많아!');
    return `<div class="petCard" onclick="choosePet('${k}')">
      <div class="e">${p.emojis[0]}</div>
      <div class="n">${p.name}</div>
      <div class="tag">${tag}</div>
    </div>`;
  }).join('');
}
function choosePet(type){
  S=defaultState(type);
  save();
  enterMain();
  toast(PETS[type].name+'을(를) 데려왔어! 🎉');
}

/* ============ 메인 ============ */
function petEmojiNow(){ return PETS[S.type].emojis[S.stage]; }
function stageName(){ return (PETS[S.type].bug?STAGE_NAMES_BUG:STAGE_NAMES_NORMAL)[S.stage]; }

function buildCare(){
  const p=PETS[S.type];
  // 그 펫이 좋아하는 케어만 버튼으로 보여줌 (상점/미니게임은 고정 메뉴바)
  const items = p.cares.map(c=>`<div class="careBtn" onclick="doCare('${c}')"><div class="ic">${CARE_INFO[c].ic}</div><div class="t">${CARE_INFO[c].t}</div></div>`);
  document.getElementById('careGrid').innerHTML=items.join('');
}

function enterMain(){
  buildCare();
  go('main');
  renderMain();
}
function renderMain(){
  const p=PETS[S.type];
  document.getElementById('petName').textContent=p.emojis[S.stage]+' '+p.name;
  document.getElementById('coin').textContent='💰 '+S.money;
  document.getElementById('stageTag').textContent=stageName()+' (진화 '+S.stage+'/2)';
  const pe=document.getElementById('petEmoji');
  pe.textContent=petEmojiNow();
  pe.style.fontSize=STAGE_SIZE[S.stage]+'px';
  pe.classList.toggle('sad', S.sat<30);
  document.getElementById('houseEmoji').textContent = S.hasHouse ? p.houseEmoji : '';
  document.getElementById('satFill').style.width=Math.round(S.sat)+'%';
  document.getElementById('satPct').textContent=Math.round(S.sat)+'%';
}

function spawnFx(emoji){
  const area=document.getElementById('stage3d');
  const f=document.createElement('div'); f.className='fx'; f.textContent=emoji;
  f.style.left=(40+Math.random()*40)+'%'; f.style.bottom='120px';
  area.appendChild(f); setTimeout(()=>f.remove(),1100);
}

function doCare(care){
  if(!S.alive) return;
  const p=PETS[S.type];
  const liked = p.cares.includes(care);
  if(liked){
    S.sat += 16;
    spawnFx(CARE_INFO[care].fx);
    if(CARE_INFO[care].vital) S.lastVital=Date.now();
    if(S.sat>=100){ evolve(); }
    else { renderMain(); toast('좋아해! 😊 +만족도'); }
  } else {
    S.sat -= 18;
    if(S.sat<0) S.sat=0;
    spawnFx('💢');
    toast('싫어해! 😣 -만족도');
    renderMain();
  }
  save();
}

/* ============ 진화 ============ */
function evolve(){
  if(S.stage>=2){ S.sat=100; renderMain(); toast('이미 다 컸어! 최고! 🏆'); save(); return; }
  S.stage++;
  S.sat=0;
  S.money+=100;
  save();
  // 연출
  const p=PETS[S.type];
  document.getElementById('evolvePet').textContent=p.emojis[S.stage];
  document.getElementById('evolveTxt').textContent='✨ 진화! ✨';
  document.getElementById('evolveSub').innerHTML=`${p.name}이(가) <b>${stageName()}</b>(으)로 자랐어요!<br>💰 100원 획득!`;
  go('evolve');
}
document.getElementById('evolveScreen').addEventListener('click',()=>{ enterMain(); renderMain(); });

/* ============ 상점 ============ */
function enterShop(){
  const p=PETS[S.type];
  document.getElementById('shopCoin').textContent='💰 '+S.money;
  const items=[
    { id:'food', e:'🍖', nm:'밥 (5개)', ds:'펫에게 줄 밥 · 현재 '+S.food+'개', price:10 },
    { id:'house', e:p.houseEmoji, nm:p.houseName, ds:'있으면 만족도가 천천히 떨어져요', price:100, owned:S.hasHouse },
  ];
  document.getElementById('shopList').innerHTML=items.map(it=>`
    <div class="shopItem">
      <div class="e">${it.e}</div>
      <div class="info"><div class="nm">${it.nm}</div><div class="ds">${it.ds}</div></div>
      ${it.owned ? `<span class="buyBtn owned">보유중</span>` : `<span class="buyBtn" onclick="buy('${it.id}',${it.price})">💰${it.price}</span>`}
    </div>`).join('');
  go('shop');
}
function buy(id, price){
  if(S.money<price){ toast('돈이 부족해! 💰'); return; }
  S.money-=price;
  if(id==='food'){ S.food+=5; toast('밥 5개 샀어! 🍖'); }
  if(id==='house'){ S.hasHouse=true; toast('집을 샀어! 🏠 만족도 보너스!'); }
  save(); enterShop();
}

/* 밥 케어는 food 재고 필요 */
const _doCare = doCare;
doCare = function(care){
  if(care==='food'){
    if(S.food<=0){ toast('밥이 없어! 상점에서 사자 🛒'); return; }
    S.food--;
  }
  _doCare(care);
};

/* ============ 시간 경과 (만족도 감소 / 죽음) ============ */
function applyTime(){
  if(!S || !S.alive) return;
  const now=Date.now();
  const dtHour=(now-S.lastTick)/3600000; // 시간
  S.lastTick=now;
  // 만족도 자연 감소: 24시간당 20 (집 있으면 절반인 10)
  const perDay = S.hasHouse ? 10 : 20;
  S.sat -= dtHour * (perDay/24);
  if(S.sat<0) S.sat=0;
  // 72시간 동안 필수 케어(밥/샤워/놀기) 안 하면 죽음
  if(now - S.lastVital >= THREE_DAYS){ die('72시간 동안 밥·샤워·놀아주기를 못 받았어요...'); return; }
  save();
}
function die(msg){
  S.alive=false; save();
  document.getElementById('deadEmoji').textContent=PETS[S.type].emojis[S.stage];
  document.getElementById('deadMsg').textContent=msg;
  go('dead');
}
function resetGame(){
  localStorage.removeItem('pet_save'); S=null;
  buildSelect(); go('select');
}

/* ============ 미니게임 1: 간식받기 ============ */
let catchG=null;
function startCatch(){
  document.getElementById('basket').textContent=petEmojiNow();
  catchG={ score:0, time:30, items:[], spawnTimer:0, spawnGap:1.1, baseX:innerWidth/2, last:performance.now(), raf:0, fallSpeed:140 };
  document.getElementById('catchArea').innerHTML='';
  document.getElementById('catchScore').textContent='🦴 0';
  document.getElementById('catchTime').textContent='⏱ 30';
  setBasket(Math.min(innerWidth,480)/2);
  go('catch');
  catchLoop(performance.now());
}
function setBasket(x){
  const w=Math.min(innerWidth,480);
  x=Math.max(34,Math.min(w-34,x));
  if(catchG) catchG.baseX=x;
  document.getElementById('basket').style.left=x+'px';
}
document.getElementById('catchScreen').addEventListener('pointermove',e=>{ if(catchG) setBasket(e.clientX - (innerWidth-Math.min(innerWidth,480))/2); });
document.getElementById('catchScreen').addEventListener('pointerdown',e=>{ if(catchG) setBasket(e.clientX - (innerWidth-Math.min(innerWidth,480))/2); });

const CATCH_GOOD=['🦴','🍖','🍗','🍎','🥩','🧀'];
const CATCH_BAD=['🥾','🗑️'];
function catchLoop(t){
  if(!catchG) return;
  const dt=Math.min((t-catchG.last)/1000,0.05); catchG.last=t;
  catchG.time-=dt;
  // 점점 빨라지고 자주 떨어짐
  const elapsed=30-catchG.time;
  catchG.spawnGap = Math.max(0.32, 1.1 - elapsed*0.025);
  catchG.fallSpeed = 140 + elapsed*7;
  catchG.spawnTimer-=dt;
  if(catchG.spawnTimer<=0){
    catchG.spawnTimer=catchG.spawnGap;
    spawnFalling();
  }
  const area=document.getElementById('catchArea');
  const areaH=area.clientHeight;
  for(const it of catchG.items){
    if(it.dead) continue;
    it.y += catchG.fallSpeed*dt;
    it.el.style.top=it.y+'px';
    // 바구니 근처에서 받기
    if(it.y > areaH-90 && it.y < areaH-30){
      if(Math.abs(it.x - catchG.baseX) < 42){
        it.dead=true; it.el.remove();
        if(it.bad){ catchG.score=Math.max(0,catchG.score-2); toast('윽! 쓰레기 😖'); }
        else catchG.score+=1;
        document.getElementById('catchScore').textContent='🦴 '+catchG.score;
      }
    }
    if(it.y>areaH+40){ it.dead=true; it.el.remove(); }
  }
  catchG.items=catchG.items.filter(i=>!i.dead);
  document.getElementById('catchTime').textContent='⏱ '+Math.max(0,Math.ceil(catchG.time));
  if(catchG.time<=0){ endCatch(); return; }
  catchG.raf=requestAnimationFrame(catchLoop);
}
function spawnFalling(){
  const w=Math.min(innerWidth,480);
  const bad=Math.random()<0.18;
  const el=document.createElement('div'); el.className='falling';
  el.textContent = bad ? CATCH_BAD[Math.floor(Math.random()*CATCH_BAD.length)] : CATCH_GOOD[Math.floor(Math.random()*CATCH_GOOD.length)];
  const x=30+Math.random()*(w-60);
  el.style.left=x+'px'; el.style.top='-40px';
  document.getElementById('catchArea').appendChild(el);
  catchG.items.push({el,x,y:-40,bad,dead:false});
}
function endCatch(){
  if(!catchG) return;
  cancelAnimationFrame(catchG.raf);
  const earned=catchG.score*3;
  S.money+=earned; save();
  catchG=null;
  enterMain();
  toast('간식 게임 끝! 💰 '+earned+'원 벌었어!');
}

/* ============ 미니게임 2: 짝맞추기 ============ */
let matchG=null;
const MATCH_EMOJIS=['🐶','🐱','🐢','🐠','🐹','🦎','🐤','🪲','🦴','🍖','🎾','🛁','💊','🌳','🏠','⭐'];
function startMatch(){
  matchG={ level:1, time:30, pairs:3, first:null, lock:false, matched:0, raf:0, last:performance.now(), money:0 };
  go('match');
  setupMatchLevel();
  matchTick(performance.now());
}
function setupMatchLevel(){
  const pairs=matchG.pairs;
  const chosen=MATCH_EMOJIS.slice(0,pairs);
  let deck=[...chosen,...chosen];
  // 셔플
  for(let i=deck.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [deck[i],deck[j]]=[deck[j],deck[i]]; }
  matchG.matched=0; matchG.first=null; matchG.lock=false;
  const grid=document.getElementById('matchGrid');
  const cols = pairs<=4?3 : (pairs<=6?4:4);
  grid.style.gridTemplateColumns=`repeat(${cols},1fr)`;
  grid.innerHTML=deck.map((e,i)=>`<div class="mcard" data-i="${i}" data-e="${e}" onclick="flipCard(this)"><span class="face">${e}</span><span class="back">❓</span></div>`).join('');
  // 처음엔 다 가림
  grid.querySelectorAll('.mcard').forEach(c=>updateCard(c));
  document.getElementById('matchLevel').textContent='레벨 '+matchG.level+' ('+pairs+'쌍)';
}
function updateCard(c){
  const flipped=c.classList.contains('flipped')||c.classList.contains('matched');
  c.querySelector('.face').style.display=flipped?'inline':'none';
  c.querySelector('.back').style.display=flipped?'none':'inline';
}
function flipCard(c){
  if(!matchG||matchG.lock) return;
  if(c.classList.contains('flipped')||c.classList.contains('matched')) return;
  c.classList.add('flipped'); updateCard(c);
  if(!matchG.first){ matchG.first=c; return; }
  // 두번째
  const a=matchG.first, b=c;
  if(a.dataset.e===b.dataset.e){
    a.classList.add('matched'); b.classList.add('matched');
    matchG.first=null; matchG.matched++;
    if(matchG.matched>=matchG.pairs){ nextMatchLevel(); }
  } else {
    matchG.lock=true;
    setTimeout(()=>{ a.classList.remove('flipped'); b.classList.remove('flipped'); updateCard(a); updateCard(b); matchG.first=null; matchG.lock=false; },650);
  }
}
function nextMatchLevel(){
  matchG.money+=15;
  matchG.level++;
  matchG.pairs=Math.min(8, matchG.pairs+1); // 점점 카드 많아짐
  matchG.time=Math.max(18, 32 - matchG.level*2); // 시간제한 점점 빡빡
  toast('레벨 클리어! 💰+15 다음 레벨!');
  setTimeout(()=>{ if(matchG) setupMatchLevel(); },700);
}
function matchTick(t){
  if(!matchG) return;
  const dt=(t-matchG.last)/1000; matchG.last=t;
  matchG.time-=dt;
  document.getElementById('matchTime').textContent='⏱ '+Math.max(0,Math.ceil(matchG.time));
  if(matchG.time<=0){ endMatch(true); return; }
  matchG.raf=requestAnimationFrame(matchTick);
}
function endMatch(timeUp){
  if(!matchG) return;
  cancelAnimationFrame(matchG.raf);
  const earned=matchG.money;
  S.money+=earned; save();
  matchG=null;
  enterMain();
  toast((timeUp?'시간 끝! ':'')+'💰 '+earned+'원 벌었어!');
}

/* ============ 시작 ============ */
function init(){
  buildSelect();
  const saved=load();
  if(saved && saved.type){
    S=saved;
    applyTime();
    if(!S.alive){ die(document.getElementById('deadMsg').textContent||'펫이 떠났어요...'); }
    else { enterMain(); }
  } else {
    go('select');
  }
  // 주기적 시간 적용 + 저장
  setInterval(()=>{ if(S&&S.alive){ applyTime(); if(document.getElementById('mainScreen').classList.contains('on')) renderMain(); } }, 5000);
}
init();
</script>
